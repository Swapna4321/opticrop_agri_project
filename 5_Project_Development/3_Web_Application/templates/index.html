<!DOCTYPE html>
<html>
<head>
    <title>OptiCrop</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>OptiCrop - Crop Recommendation System</h1>

<form action="/predict" method="post">

    <input type="text" name="N" placeholder="Nitrogen (N)" required><br><br>

    <input type="text" name="P" placeholder="Phosphorus (P)" required><br><br>

    <input type="text" name="K" placeholder="Potassium (K)" required><br><br>

    <input type="text" name="temperature" placeholder="Temperature" required><br><br>

    <input type="text" name="humidity" placeholder="Humidity" required><br><br>

    <input type="text" name="ph" placeholder="pH Value" required><br><br>

    <input type="text" name="rainfall" placeholder="Rainfall" required><br><br>

    <button type="submit">Predict Crop</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
